<!DOCTYPE html>
<html>
<head>
    <title>Marks & Even Number Sum</title>
    <link rel="stylesheet" href="style.css">
    

<body>
    

    <h2>Enter Marks of 5 Subjects</h2>

    Subject 1: <input type="number" id="m1"><br><br>
    Subject 2: <input type="number" id="m2"><br><br>
    Subject 3: <input type="number" id="m3"><br><br>
    Subject 4: <input type="number" id="m4"><br><br>
    Subject 5: <input type="number" id="m5"><br><br>

    <button onclick="calculateMarks()">Calculate Total Marks</button>

    <p id="totalMarks"></p>

    <hr>

    <h2>Sum of Even Numbers from 1 to n</h2>

    Enter number n: <input type="number" id="num"><br><br>

    <button onclick="sumEvenNumbers()">Calculate Even Sum</button>

    <p id="evenSum"></p>

    <script src="script.js"></script>

</body>
</html>
