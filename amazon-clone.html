<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f3f3;
}

/* Navbar */
.navbar{
    background:#131921;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#ff9900;
}

.search-box{
    width:50%;
    padding:10px;
    border:none;
    border-radius:5px;
}

.cart{
    font-size:18px;
}

/* Hero */
.hero{
    background:url("https://images.unsplash.com/photo-1556740749-887f6717d7e4?w=1200");
    background-size:cover;
    background-position:center;
    height:300px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:40px;
    font-weight:bold;
}

/* Products */
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:30px;
}

.product{
    background:white;
    width:250px;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.product img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.product h3{
    margin:10px 0;
}

.product button{
    background:#ff9900;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

/* Cart */
.cart-section{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
}

/* Contact */
.contact{
    background:#232f3e;
    color:white;
    padding:30px;
    text-align:center;
}

.contact input,
.contact textarea{
    width:80%;
    padding:10px;
    margin:10px;
}

.contact button{
    background:#ff9900;
    color:white;
    border:none;
    padding:10px 20px;
}

/* Footer */
.footer{
    background:#131921;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Amazon</div>
    <input type="text" class="search-box" placeholder="Search Products...">
    <div class="cart">🛒 Cart: <span id="cartCount">0</span></div>
</div>

<div class="hero">
    Welcome To Amazon Clone
</div>

<div class="products" id="products"></div>

<div class="cart-section">
    <h2>Cart Items</h2>
    <ul id="cartList"></ul>
</div>

<div class="contact">
    <h2>Contact Us</h2>
    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea rows="4" placeholder="Your Message"></textarea><br>
    <button>Send Message</button>
</div>

<div class="footer">
    ©️ 2026 Amazon Clone | Made with HTML, CSS & JavaScript
</div>

<script>
const products = [
{
id:1,
name:"Laptop",
price:50000,
image:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500"
},
{
id:2,
name:"Smartphone",
price:25000,
image:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500"
},
{
id:3,
name:"Headphones",
price:3000,
image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
},
{
id:4,
name:"Smart Watch",
price:7000,
image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500"
}
];

let cart=[];

const productsDiv=document.getElementById("products");

products.forEach(product=>{
productsDiv.innerHTML+=`
<div class="product">
<img src="${product.image}">
<h3>${product.name}</h3>
<p>₹${product.price}</p>
<button onclick="addToCart(${product.id})">
Add To Cart
</button>
</div>
`;
});

function addToCart(id){
const product=products.find(p=>p.id===id);
cart.push(product);

document.getElementById("cartCount").innerText=cart.length;

const li=document.createElement("li");
li.innerText=`${product.name} - ₹${product.price}`;
document.getElementById("cartList").appendChild(li);
}
</script>

</body>
</html>
